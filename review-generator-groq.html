<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Share Your Review</title>
<style>
  /* =============================================
     CONFIG — edit colours, fonts here
  ============================================= */
  :root {
    --accent: #1a73e8;
    --accent-dark: #1558b0;
    --green: #1e8c5a;
    --green-dark: #156644;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --border: #e0e0e0;
    --chip-active-bg: #e8f0fe;
    --chip-active-border: #4285f4;
    --chip-active-text: #1a56c4;
    --error-bg: #fce8e8;
    --error-text: #b71c1c;
    --radius: 10px;
    --radius-pill: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  .wrap { max-width: 500px; margin: 0 auto; }

  /* Header */
  .header {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .dark-toggle {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; cursor: pointer;
    font-size: 16px; flex-shrink: 0;
  }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
  }

  /* Labels */
  label.section-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .optional { font-weight: 400; font-size: 11px; color: #999; margin-left: 4px; text-transform: none; letter-spacing: 0; }

  /* Inputs */
  input[type="text"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    background: var(--card);
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover { border-color: #aaa; color: var(--text); }
  .chip.on { background: var(--chip-active-bg); border-color: var(--chip-active-border); color: var(--chip-active-text); font-weight: 500; }

  /* Buttons */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .btn-generate:hover { background: var(--accent-dark); }
  .btn-generate:disabled { background: #bbb; cursor: not-allowed; }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-regen {
    flex: 1; padding: 11px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: var(--radius);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-regen:hover { background: var(--bg); }
  .btn-copy {
    flex: 2; padding: 11px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-copy:hover { background: var(--green-dark); }

  /* Review textarea */
  .review-box {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-size: 15px;
    line-height: 1.7;
    min-height: 130px;
    background: #fafafa;
    color: var(--text);
    font-family: inherit;
    resize: vertical;
    outline: none;
  }
  .review-box:focus { border-color: var(--accent); }

  /* Error */
  .error {
    background: var(--error-bg);
    color: var(--error-text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 10px;
  }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e8c5a;
    color: #fff;
    padding: 11px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Others input */
  #others-wrap { margin-top: 8px; }

  /* Result card hidden initially */
  #result-card { display: none; }

  /* Dark mode */
  body.dark {
    --bg: #111;
    --card: #1e1e1e;
    --text: #f0f0f0;
    --muted: #999;
    --border: #333;
    --chip-active-bg: #1a2a4a;
    --chip-active-border: #4285f4;
    --chip-active-text: #80b3ff;
    --error-bg: #3a1010;
    --error-text: #ff8080;
  }
  body.dark .review-box { background: #161616; }
  body.dark .btn-regen:hover { background: #2a2a2a; }
</style>
</head>
<body>

<!-- =============================================
     CONFIG — edit these variables
============================================= -->
<script>
const CONFIG = {

  // YOUR GROQ API KEY — replace this!

  // Groq model — llama-3.3-70b is fast and high quality
  // Other options: "llama-3.1-8b-instant" (faster), "mixtral-8x7b-32768"

    "Dinner Sets","Gas Stoves","Chimney","Cookware",

  keywordSynonyms: {

    "Friendly Owner": ["owner is very friendly","owner is welcoming","the owner treats you like family"],
    "Affordable Prices": ["prices are reasonable","good value for money","very fair pricing"],
    "Huge Variety": ["great selection","so many options","wide range of products"],
    "Premium Quality": ["quality products","good quality stuff","everything feels durable"],
    "Fast Service": ["quick service","didn't have to wait","served promptly"],
    "Genuine Products": ["original products only","authentic brands","no duplicate items"],
    "Good Guidance": ["they guide you well","helped me choose the right product","gave good advice"],
    "Clean Store": ["store is neat and organized","clean and tidy shop","well-maintained store"],
    "Trusted Shop": ["reliable shop","you can trust this place","been buying here for years"],
  },

  languages: ["English","Hindi","Hinglish","Punjabi + English"],
  tones: ["Short","Casual","Friendly","Professional","Detailed"],
};
</script>

<!-- =============================================
     HTML
============================================= -->
<div class="wrap">

  <div class="header">
    <div>
      <h1 id="store-name"></h1>
      <p id="store-tagline"></p>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  </div>

  <!-- Name -->
  <div class="card">
    <label class="section-label">Your name <span class="optional">(optional)</span></label>
    <input type="text" id="name" placeholder="e.g. Ramesh, Priya..." />
  </div>

  <!-- Products -->
  <div class="card">
    <label class="section-label">What did you buy? <span class="optional">(optional)</span></label>
    <div class="chips" id="products-chips"></div>
    <div id="others-wrap" style="display:none">
      <input type="text" id="others-text" placeholder="Tell us what you bought..." style="margin-top:8px" />
    </div>
  </div>

  <!-- Experience -->
  <div class="card">
    <label class="section-label">How was your experience? <span class="optional" style="color:#c0392b">pick at least one</span></label>
    <div class="chips" id="exp-chips"></div>
  </div>

  <!-- Language -->
  <div class="card">
    <label class="section-label">Review language</label>
    <div class="chips" id="lang-chips"></div>
  </div>

  <!-- Tone -->
  <div class="card">
    <label class="section-label">Tone <span class="optional">(optional)</span></label>
    <div class="chips" id="tone-chips"></div>
  </div>

  <!-- Comments -->
  <div class="card">
    <label class="section-label">Anything else to add? <span class="optional">(optional)</span></label>
    <textarea id="comments" placeholder="Any specific details you'd like to mention..."></textarea>
  </div>

  <!-- Error -->
  <div id="error-box" class="error" style="display:none"></div>

  <!-- Generate -->
  <button class="btn-generate" id="gen-btn" onclick="generate()">
    ✨ Generate my review
  </button>

  <!-- Result -->
  <div class="card" id="result-card">
    <label class="section-label">Your review <span class="optional">— feel free to edit</span></label>
    <textarea class="review-box" id="review-output"></textarea>
    <div class="btn-row">
      <button class="btn-regen" id="regen-btn" onclick="generate(true)">↺ Regenerate</button>
      <button class="btn-copy" onclick="copyReview()">Copy & open Google ↗</button>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ Copied! Opening Google Reviews...</div>

<!-- =============================================
     JAVASCRIPT
============================================= -->
<script>
/* State */
const selectedProducts = new Set();
const selectedExp = new Set();
let selectedLang = "English";
let selectedTone = "Casual";

/* Init */
document.getElementById("store-name").textContent = CONFIG.storeName;
document.getElementById("store-tagline").textContent = CONFIG.tagline;

function buildChips(containerId, items, mode, defaultVal) {
  const wrap = document.getElementById(containerId);
  items.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "chip" + (item === defaultVal ? " on" : "");
    btn.textContent = item;
    btn.type = "button";
    btn.onclick = () => handleChip(btn, item, mode, containerId);
    wrap.appendChild(btn);
  });
}

function handleChip(btn, val, mode, containerId) {
  if (mode === "single") {
    document.getElementById(containerId).querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
    btn.classList.add("on");
    if (containerId === "lang-chips") selectedLang = val;
    if (containerId === "tone-chips") selectedTone = val;
  } else {
    btn.classList.toggle("on");
    const set = containerId === "products-chips" ? selectedProducts : selectedExp;
    btn.classList.contains("on") ? set.add(val) : set.delete(val);
    if (containerId === "products-chips" && val === "Others") {
      document.getElementById("others-wrap").style.display = btn.classList.contains("on") ? "block" : "none";
    }
  }
}

buildChips("products-chips", CONFIG.products, "multi", null);
buildChips("exp-chips", CONFIG.experienceKeywords, "multi", null);
buildChips("lang-chips", CONFIG.languages, "single", "English");
buildChips("tone-chips", CONFIG.tones, "single", "Casual");

/* Expand keywords with synonyms for variety */
function expandKeywords(keywords) {
  return keywords.map(kw => {
    const syns = CONFIG.keywordSynonyms[kw];
    return syns && syns.length ? syns[Math.floor(Math.random() * syns.length)] : kw;
  }).join(", ");
}

/* Build Gemini prompt */
function buildPrompt(data) {
  const langInstructions = {
    "English": "Write in natural Indian English. Sound like a real customer from India, not formal British/American English.",
    "Hindi": "Write in Hindi using Devanagari script (हिंदी). Use everyday conversational Hindi — not textbook Hindi.",
    "Hinglish": "Write in Hinglish — the natural mix of Hindi and English Indians use daily. Example style: 'Staff bahut helpful tha, prices bhi reasonable hain. Definitely recommend karunga.'",
    "Punjabi + English": "Mostly English but sprinkle in natural Punjabi words/phrases like 'bahut vadiya', 'zabardast', 'shukriya'. Keep it mostly English with a Punjabi flavour.",
  };
  const toneInstructions = {
    "Short": "1–2 short sentences only. Be concise and direct.",
    "Casual": "3–4 sentences. Relaxed everyday tone like texting a friend.",
    "Friendly": "3–5 warm friendly sentences. Conversational and positive, not over the top.",
    "Professional": "4–5 sentences. Slightly formal but genuine. Thoughtful customer.",
    "Detailed": "6–8 sentences. Mention what you liked, why, whether you'd return.",
  };

  return `You are writing a genuine Google review for a crockery and kitchen appliances retail store in India.

Customer info:
- Name: ${data.name || "anonymous customer"}
- Products: ${data.products.length ? data.products.join(", ") : "general kitchen items"}
- Experience highlights: ${expandKeywords(data.experiences)}
- Language: ${data.lang}
- Comments from customer: ${data.comments || "none"}
- Variation key: ${Math.random().toFixed(6)}

Language style: ${langInstructions[data.lang] || langInstructions["English"]}
Tone: ${toneInstructions[data.tone] || toneInstructions["Casual"]}

Rules:
1. Sound HUMAN — like a real Indian customer, not an AI
2. Do NOT always start with "I" — vary the opening
3. Avoid clichés: "highly recommend", "look no further", "hidden gem", "world-class", "exceeded expectations"
4. Max 1–2 emojis or none at all
5. Vary sentence structure — mix short and long
6. Small informalities are fine — makes it feel real
7. No hashtags
8. Only mention the name if one was given
9. Output ONLY the review text — no quotes, no explanation, no preamble`;
}

/* API call */
async function callGroq(prompt) {
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${CONFIG.groqApiKey}`
    },
    body: JSON.stringify({
      model: CONFIG.groqModel,
      messages: [{ role: "user", content: prompt }],
      temperature: 0.95,
      max_tokens: 400,
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  const text = data?.choices?.[0]?.message?.content;
  if (!text) throw new Error("No review returned from Groq.");
  return text.trim();
}

/* Generate review */
async function generate(isRegen) {
  const errorBox = document.getElementById("error-box");
  errorBox.style.display = "none";

  const experiences = [...selectedExp];
  if (experiences.length === 0) {
    errorBox.textContent = "Please select at least one experience keyword above.";
    errorBox.style.display = "block";
    return;
  }

  if (CONFIG.groqApiKey === "YOUR_GROQ_API_KEY_HERE") {
    errorBox.textContent = "⚠ Please add your Groq API key in the CONFIG section at the top of this file.";
    errorBox.style.display = "block";
    return;
  }

  const genBtn = document.getElementById("gen-btn");
  const regenBtn = document.getElementById("regen-btn");
  genBtn.disabled = true;
  genBtn.innerHTML = '<div class="spinner"></div> Writing your review...';
  if (regenBtn) regenBtn.disabled = true;

  const othersText = document.getElementById("others-text").value.trim();
  const products = [...selectedProducts].map(p => (p === "Others" && othersText) ? othersText : p).filter(p => p !== "Others" || othersText);

  try {
    const prompt = buildPrompt({
      name: document.getElementById("name").value.trim(),
      products,
      experiences,
      lang: selectedLang,
      tone: selectedTone,
      comments: document.getElementById("comments").value.trim(),
    });

    const review = await callGroq(prompt);
    document.getElementById("review-output").value = review;
    document.getElementById("result-card").style.display = "block";
    document.getElementById("result-card").scrollIntoView({ behavior: "smooth", block: "nearest" });
  } catch (e) {
    errorBox.textContent = "Error: " + e.message;
    errorBox.style.display = "block";
  } finally {
    genBtn.disabled = false;
    genBtn.innerHTML = "✨ Generate my review";
    if (regenBtn) regenBtn.disabled = false;
  }
}

/* Copy and redirect */
async function copyReview() {
  const review = document.getElementById("review-output").value;
  if (!review) return;

  try {
    await navigator.clipboard.writeText(review);
  } catch {
    const ta = document.createElement("textarea");
    ta.value = review;
    ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }

  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => {
    toast.classList.remove("show");
    window.open(CONFIG.googleReviewUrl, "_blank");
  }, CONFIG.redirectDelay);
}

/* Dark mode */
function toggleDark() {
  document.body.classList.toggle("dark");
  document.querySelector(".dark-toggle").textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}
if (localStorage.getItem("theme") === "dark" || (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.querySelector(".dark-toggle").textContent = "☀️";
}
</script>
</body>
</html>
